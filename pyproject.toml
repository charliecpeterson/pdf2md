[project]
name = "docsmcp"
version = "0.1.0"
description = "MCP server for high-accuracy PDF/scan transcription to markdown with provenance"
requires-python = ">=3.11"
dependencies = [
    "fastmcp>=2.0",
    "docling>=2.0",
    "pymupdf>=1.24",
    "ocrmac>=1.0.1",
    "marker-pdf>=1.10.2",
    "sentence-transformers>=5.4.1",
    "sqlite-vec>=0.1.9",
    "mlx-vlm>=0.3.9",
]

[project.scripts]
docsmcp = "docsmcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/docsmcp"]
